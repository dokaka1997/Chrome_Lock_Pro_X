<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biometric Unlock</title>
  <link rel="stylesheet" href="biometric.css" />
</head>
<body>
  <main class="shell">
    <section class="panel">
      <div class="eyebrow">Chrome Lock Pro X</div>
      <h1 id="title">Biometric Unlock</h1>
      <p id="subtitle">Chrome will ask your device to verify your fingerprint, face, or platform PIN.</p>
      <div id="status" class="status">Loading...</div>
      <div class="actions">
        <button id="actionBtn" class="primary" type="button" disabled>Continue</button>
        <button id="cancelBtn" class="secondary" type="button">Cancel</button>
      </div>
      <p id="note" class="note"></p>
    </section>
  </main>
  <script src="i18n.js"></script>
  <script src="biometric.js"></script>
</body>
</html>
